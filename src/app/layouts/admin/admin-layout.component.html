<div class="flex min-h-screen">
  <aside class="hidden w-64 flex-col gap-6 border-r border-slate-200/70 bg-white/80 px-6 py-8 backdrop-blur-lg lg:flex">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-2xl bg-brand-500/20 text-brand-700 flex items-center justify-center font-semibold">BS</div>
      <div>
        <p class="text-sm uppercase tracking-widest text-slate-500">Admin</p>
        <p class="text-lg font-semibold">Ben's Services</p>
      </div>
    </div>
    <nav class="flex flex-1 flex-col gap-2">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-brand-500 text-white"
        class="rounded-xl px-4 py-3 text-sm font-semibold text-slate-600 transition hover:bg-brand-100 hover:text-brand-700"
      >
        {{ item.label }}
      </a>
    </nav>
    <div class="card-surface rounded-2xl p-4 text-sm">
      <p class="font-semibold text-slate-900">Operational Pulse</p>
      <p class="mt-2 text-slate-500">92% provider response in the last 24 hours.</p>
      <button class="mt-3 w-full rounded-xl bg-ink px-3 py-2 text-xs font-semibold text-white">View insights</button>
    </div>
  </aside>

  <div class="flex flex-1 flex-col">
    <header class="flex flex-wrap items-center justify-between gap-4 px-6 py-5 lg:px-10">
      <div>
        <p class="text-sm uppercase tracking-[0.2em] text-slate-400">Ben's Services Dispatch</p>
        <h1 class="text-2xl font-semibold text-slate-900">Operations Command Center</h1>
      </div>
      <div class="flex items-center gap-3">
        <div class="hidden items-center gap-2 rounded-full bg-white/80 px-4 py-2 text-sm text-slate-600 shadow-sm lg:flex">
          <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
          SLA status: On track
        </div>
        <button class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700">Export</button>
        <div class="flex items-center gap-2 rounded-full bg-slate-900 px-3 py-2 text-xs font-semibold text-white">
          MA
        </div>
      </div>
    </header>

    <nav class="flex gap-2 overflow-x-auto px-6 pb-4 lg:hidden">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-brand-600 text-white"
        class="whitespace-nowrap rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-semibold text-slate-600"
      >
        {{ item.label }}
      </a>
    </nav>

    <main class="flex-1 px-6 pb-10 lg:px-10">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
