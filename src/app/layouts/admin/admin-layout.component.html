<div class="flex min-h-screen">
  <aside class="hidden w-72 flex-col gap-6 border-r border-slate-200/70 bg-white/85 px-6 py-8 backdrop-blur-lg lg:flex">
    <div class="flex items-center gap-3">
      <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-brand-500/20 font-semibold text-brand-700">BS</div>
      <div>
        <p class="text-xs uppercase tracking-[0.24em] text-slate-500">Admin Portal</p>
        <p class="text-lg font-semibold text-slate-900">Ben's Services</p>
      </div>
    </div>

    <nav class="flex flex-1 flex-col gap-2">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-brand-600 text-white shadow-sm"
        class="rounded-xl px-4 py-3 text-sm font-semibold text-slate-600 transition hover:bg-brand-100 hover:text-brand-700"
      >
        {{ item.label }}
      </a>
    </nav>

    <div class="card-surface rounded-2xl p-4 text-sm">
      <p class="font-semibold text-slate-900">Operational Pulse</p>
      <p class="mt-2 text-slate-500">92% provider response in the last 24 hours.</p>
      <button (click)="onOpenInsights()" class="mt-3 w-full rounded-xl bg-ink px-3 py-2 text-xs font-semibold text-white">View insights</button>
    </div>

    <a routerLink="/role" class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500 transition hover:text-slate-900">Switch role</a>
  </aside>

  <div class="flex min-w-0 flex-1 flex-col">
    <header class="sticky top-0 z-20 border-b border-slate-200/75 bg-white/80 backdrop-blur-lg">
      <div class="app-shell-main flex flex-wrap items-center justify-between gap-4 py-4 lg:py-5">
        <div>
          <p class="text-[11px] uppercase tracking-[0.22em] text-slate-400">Ben's Services Dispatch</p>
          <h1 class="text-xl font-semibold text-slate-900 sm:text-2xl">Operations Command Center</h1>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
          <div class="hidden items-center gap-2 rounded-full bg-white px-3 py-2 text-xs font-semibold text-slate-600 shadow-sm sm:flex">
            <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
            SLA status: On track
          </div>
          <button (click)="onExport()" class="rounded-full border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-700 sm:px-4 sm:text-sm">Export</button>
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-900 text-xs font-semibold text-white">MA</div>
        </div>
      </div>
    </header>

    <div *ngIf="uiMessage" class="app-shell-main py-3">
      <div class="flex items-start justify-between gap-3 rounded-2xl border border-brand-200 bg-brand-50 px-4 py-3 text-sm text-brand-800">
        <p>{{ uiMessage }}</p>
        <button (click)="clearUiMessage()" class="rounded-full border border-brand-300 px-3 py-1 text-xs font-semibold">Dismiss</button>
      </div>
    </div>

    <nav class="app-shell-main app-scroll-x flex gap-2 py-3 lg:hidden">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-brand-600 text-white"
        class="whitespace-nowrap rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-semibold text-slate-600"
      >
        {{ item.label }}
      </a>
      <a routerLink="/role" class="whitespace-nowrap rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-semibold text-slate-600">
        Switch role
      </a>
    </nav>

    <main class="app-shell-main fade-in flex-1 py-6 pb-10 lg:py-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
