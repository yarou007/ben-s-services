<div class="min-h-screen">
  <header class="sticky top-0 z-20 border-b border-slate-200/70 bg-white/90 backdrop-blur-lg">
    <div class="app-shell-main py-4">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-brand-600 text-sm font-semibold text-white">BS</div>
          <div>
            <p class="text-sm font-semibold text-brand-700">Ben's Services</p>
            <p class="text-xs text-slate-400">Provider Network</p>
          </div>
        </div>

        <a class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-500 transition hover:text-slate-900" routerLink="/role">
          Exit
        </a>
      </div>

      <nav class="app-scroll-x mt-3 flex items-center gap-2">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.path"
          routerLinkActive="bg-brand-600 text-white"
          class="whitespace-nowrap rounded-full border border-transparent bg-white px-4 py-2 text-sm font-semibold text-slate-600 transition hover:border-brand-200 hover:bg-brand-50 hover:text-brand-700"
        >
          {{ item.label }}
        </a>
      </nav>
    </div>
  </header>

  <main class="app-shell-main fade-in py-6 sm:py-8 lg:py-10">
    <router-outlet></router-outlet>
  </main>
</div>
