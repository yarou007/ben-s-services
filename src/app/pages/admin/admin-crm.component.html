<section class="grid gap-5 sm:gap-6">
  <app-toast-message [show]="showToast" [message]="toastMessage" [tone]="toastTone" (dismiss)="dismissToast()"></app-toast-message>

  <app-page-header
    kicker="Admin Workspace"
    title="Customer CRM"
    subtitle="Browse customer accounts, request counts, and latest request status."
  >
    <button type="button" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700" (click)="resetFilters()">Reset Filters</button>
    <button type="button" class="rounded-full bg-brand-600 px-4 py-2 text-sm font-semibold text-white" (click)="exportRecords()">Export CSV</button>
  </app-page-header>

  <div class="card-surface rounded-3xl p-5 sm:p-6">
    <div class="grid gap-3 md:grid-cols-3">
      <input #searchInput class="rounded-full border border-slate-200 px-4 py-2 text-sm" placeholder="Search name, email, phone" [value]="searchTerm" (input)="searchTerm = searchInput.value; page = 1" />

      <select class="rounded-full border border-slate-200 px-4 py-2 text-sm" [value]="statusFilter" (change)="statusFilter = $any($event.target).value; page = 1">
        <option value="ALL">Last status: All</option>
        <option *ngFor="let status of statusOptions" [value]="status">{{ formatStatus(status) }}</option>
      </select>

      <button type="button" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700" (click)="load()">Refresh</button>
    </div>
  </div>

  <div class="grid gap-4" *ngIf="pagedRecords.length; else noRecords">
    <article *ngFor="let record of pagedRecords" class="card-surface rounded-2xl p-5">
      <div class="flex flex-wrap items-start justify-between gap-2">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ record.name }}</p>
          <p class="text-xs text-slate-500">{{ record.email }} · {{ record.phone }}</p>
        </div>
        <app-status-badge [status]="record.lastStatus"></app-status-badge>
      </div>

      <div class="mt-3 grid gap-2 text-sm text-slate-600 sm:grid-cols-3">
        <span>Requests: {{ record.requestsCount }}</span>
        <span>Last updated: {{ record.lastUpdated }}</span>
        <span>Cities: {{ record.cities.join(', ') }}</span>
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        <button type="button" class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold" (click)="openDetails(record)">View account</button>
      </div>
    </article>
  </div>

  <app-pagination-controls
    [page]="page"
    [pageSize]="pageSize"
    [total]="filteredRecords.length"
    (pageChange)="pageChange($event)"
    (pageSizeChange)="pageSizeChange($event)"
  ></app-pagination-controls>

  <ng-template #noRecords>
    <app-empty-state title="No CRM records found" description="Try changing your filters."></app-empty-state>
  </ng-template>

  <app-details-modal
    [open]="showDetailsModal"
    [title]="selectedRecord?.name || 'Customer details'"
    [subtitle]="selectedRecord?.email || ''"
    [fields]="detailsFields"
    (close)="closeDetails()"
  ></app-details-modal>
</section>
