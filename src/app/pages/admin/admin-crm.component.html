<section class="grid gap-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <p class="text-sm uppercase tracking-[0.2em] text-slate-400">CRM</p>
      <h2 class="text-2xl font-semibold text-slate-900">Customer accounts</h2>
      <p class="mt-2 text-sm text-slate-500">Primary focus: commercial accounts and multi-site managers.</p>
    </div>
    <div class="flex flex-wrap gap-2">
      <input class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm" placeholder="Search customers" />
      <button class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">Filter</button>
      <button class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">Export</button>
      <button class="rounded-full bg-brand-600 px-4 py-2 text-sm font-semibold text-white">Add account</button>
    </div>
  </div>

  <div class="grid gap-4">
    <div *ngFor="let customer of customers" class="card-surface rounded-2xl p-5">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ customer.name }}</p>
          <p class="text-xs text-slate-500">{{ customer.segment }} · {{ customer.email }}</p>
        </div>
        <span class="pill pill-blue">{{ customer.status }}</span>
      </div>
      <div class="mt-3 flex flex-wrap items-center justify-between gap-2 text-sm text-slate-600">
        <span>Last request: {{ customer.lastRequest }}</span>
        <span>Lifetime value: {{ customer.lifetimeValue }}</span>
      </div>
      <div class="mt-4 flex flex-wrap gap-2">
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">View account</button>
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Message</button>
      </div>
    </div>
  </div>
</section>
