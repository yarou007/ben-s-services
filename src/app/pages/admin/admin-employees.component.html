<section class="grid gap-5 sm:gap-6">
  <div>
    <p class="app-kicker">Employees</p>
    <h2 class="app-title">Team allocation</h2>
    <p class="app-subtitle">View role distribution and current shift availability.</p>
  </div>

  <div class="grid gap-4 sm:grid-cols-2" *ngIf="team.length; else noTeam">
    <div *ngFor="let member of team" class="card-surface rounded-2xl p-5">
      <p class="text-lg font-semibold text-slate-900">{{ member.name }}</p>
      <p class="text-sm text-slate-500">{{ member.role }} · {{ member.department }}</p>
      <div class="mt-4 flex flex-wrap items-center gap-3 text-sm">
        <span class="pill pill-blue">{{ member.status }}</span>
        <span class="pill pill-orange">Shift: {{ member.shift }}</span>
      </div>
    </div>
  </div>

  <ng-template #noTeam>
    <div class="app-state-block">No employee allocation data is available.</div>
  </ng-template>
</section>
