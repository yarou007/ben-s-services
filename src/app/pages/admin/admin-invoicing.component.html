<section class="grid gap-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <p class="text-sm uppercase tracking-[0.2em] text-slate-400">Invoicing</p>
      <h2 class="text-2xl font-semibold text-slate-900">Financial overview</h2>
    </div>
    <div class="flex flex-wrap gap-2">
      <button class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">Export CSV</button>
      <button class="rounded-full bg-brand-600 px-4 py-2 text-sm font-semibold text-white">Generate invoice</button>
    </div>
  </div>
  <div class="grid gap-4">
    <div *ngFor="let invoice of invoices" class="card-surface rounded-2xl p-5">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ invoice.code }}</p>
          <p class="text-xs text-slate-500">{{ invoice.client }}</p>
        </div>
        <span [ngClass]="statusClass(invoice.status)">{{ invoice.status }}</span>
      </div>
      <div class="mt-3 flex flex-wrap items-center justify-between gap-2 text-sm text-slate-600">
        <span>Amount: {{ invoice.amount }}</span>
        <span>Due: {{ invoice.due }}</span>
        <span>Method: {{ invoice.method }}</span>
        <span>Sent to: {{ invoice.sentTo }}</span>
      </div>
    </div>
  </div>
</section>
