<section class="mx-auto max-w-lg">

    <form class="mt-6 grid gap-4">
      <label class="grid gap-2 text-sm font-semibold text-slate-600">
        Email
        <input class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm" placeholder="admin@bensservices.com" />
      </label>
      <label class="grid gap-2 text-sm font-semibold text-slate-600">
        Password

      <button class="rounded-2xl bg-ink px-4 py-3 text-sm font-semibold text-white">Sign in</button>
