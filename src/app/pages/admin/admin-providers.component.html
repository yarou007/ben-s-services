<section class="grid gap-5 sm:gap-6">
  <app-toast-message [show]="showToast" [message]="toastMessage" [tone]="toastTone" (dismiss)="dismissToast()"></app-toast-message>

  <app-page-header
    kicker="Admin Workspace"
    title="Provider Management"
    subtitle="Approve, monitor, and export service provider records."
  >
    <button type="button" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700" (click)="exportProviders()">Export CSV</button>
    <button type="button" class="rounded-full bg-ink px-4 py-2 text-sm font-semibold text-white" (click)="inviteProvider()">Invite Provider</button>
  </app-page-header>

  <div class="card-surface rounded-3xl p-5 sm:p-6">
    <div class="grid gap-3 md:grid-cols-4">
      <input
        #searchInput
        class="rounded-full border border-slate-200 px-4 py-2 text-sm"
        placeholder="Search provider"
        [value]="searchTerm"
        (input)="searchTerm = searchInput.value; page = 1"
      />

      <select class="rounded-full border border-slate-200 px-4 py-2 text-sm" [value]="statusFilter" (change)="statusFilter = $any($event.target).value; page = 1">
        <option value="ALL">Status: All</option>
        <option value="ACTIVE">Active</option>
        <option value="PENDING_APPROVAL">Pending Approval</option>
        <option value="REJECTED">Rejected</option>
        <option value="PAUSED">Paused</option>
      </select>

      <select class="rounded-full border border-slate-200 px-4 py-2 text-sm" [value]="serviceFilter" (change)="serviceFilter = $any($event.target).value; page = 1">
        <option value="ALL">Service: All</option>
        <option *ngFor="let service of serviceOptions" [value]="service">{{ service }}</option>
      </select>

      <button type="button" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600" (click)="resetFilters()">Reset Filters</button>
    </div>
  </div>

  <div class="grid gap-4 lg:grid-cols-2" *ngIf="pagedProviders.length; else noProviders">
    <article *ngFor="let provider of pagedProviders" class="card-surface rounded-2xl p-5">
      <div class="flex flex-wrap items-start justify-between gap-2">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ provider.name }}</p>
          <p class="text-xs text-slate-500">{{ provider.services.join(' · ') }}</p>
        </div>
        <app-status-badge [status]="provider.approvalStatus"></app-status-badge>
      </div>

      <div class="mt-3 grid gap-2 text-sm text-slate-600 sm:grid-cols-2">
        <span>Area: {{ provider.serviceArea }}</span>
        <span>Availability: {{ provider.availability }}</span>
        <span>Response time: {{ provider.responseTime }}</span>
        <span>Rating: {{ provider.rating.toFixed(1) }}</span>
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        <button type="button" class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold" (click)="openDetails(provider)">View Details</button>
        <button type="button" class="rounded-full border border-emerald-200 px-3 py-2 text-xs font-semibold text-emerald-700 disabled:cursor-not-allowed disabled:opacity-50" [disabled]="provider.approvalStatus === 'ACTIVE'" (click)="approve(provider)">Approve</button>
        <button type="button" class="rounded-full border border-rose-200 px-3 py-2 text-xs font-semibold text-rose-700 disabled:cursor-not-allowed disabled:opacity-50" [disabled]="provider.approvalStatus === 'REJECTED'" (click)="reject(provider)">Reject</button>
      </div>
    </article>
  </div>

  <app-pagination-controls
    [page]="page"
    [pageSize]="pageSize"
    [total]="filteredProviders.length"
    (pageChange)="pageChange($event)"
    (pageSizeChange)="pageSizeChange($event)"
  ></app-pagination-controls>

  <ng-template #noProviders>
    <app-empty-state title="No providers match current filters" description="Adjust filter criteria or clear search."></app-empty-state>
  </ng-template>

  <app-details-modal
    [open]="showDetailsModal"
    [title]="selectedProvider?.name || 'Provider Details'"
    [subtitle]="selectedProvider?.serviceArea || ''"
    [fields]="detailsFields"
    (close)="closeDetails()"
  ></app-details-modal>
</section>
