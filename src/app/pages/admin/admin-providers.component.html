<section class="grid gap-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <p class="text-sm uppercase tracking-[0.2em] text-slate-400">Providers</p>
      <h2 class="text-2xl font-semibold text-slate-900">Provider CRM</h2>
    </div>
    <button class="rounded-full bg-ink px-4 py-2 text-sm font-semibold text-white">Invite provider</button>
  </div>
  <div class="grid gap-4 lg:grid-cols-2">
    <div *ngFor="let provider of providers" class="card-surface rounded-2xl p-5">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ provider.name }}</p>
          <p class="text-xs text-slate-500">{{ provider.specialty }}</p>
        </div>
        <span class="pill pill-blue">{{ provider.rating }} rating</span>
      </div>
      <p class="mt-3 text-sm text-slate-600">Coverage: {{ provider.coverage }}</p>
      <div class="mt-3 flex flex-wrap items-center gap-3 text-xs text-slate-500">
        <span>Status: {{ provider.status }}</span>
        <span>Avg response: {{ provider.responseTime }}</span>
        <span>Jobs: {{ provider.jobsCompleted }}</span>
      </div>
      <div class="mt-4 flex flex-wrap gap-2">
        <button class="rounded-full bg-brand-600 px-3 py-2 text-xs font-semibold text-white">Dispatch job</button>
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Message</button>
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">View profile</button>
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Deactivate</button>
      </div>
    </div>
  </div>
</section>
