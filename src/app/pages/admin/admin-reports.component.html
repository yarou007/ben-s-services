<section class="grid gap-5 sm:gap-6">
  <div class="app-section-head">
    <div>
      <p class="app-kicker">Reports</p>
      <h2 class="app-title">Reporting & Exports</h2>
      <p class="app-subtitle">Generate recurring insights and one-click operational exports.</p>
    </div>
    <div class="app-action-row">
      <button type="button" class="app-btn app-btn-secondary" (click)="trigger('Export all')">Export all</button>
      <button type="button" class="app-btn app-btn-primary" (click)="trigger('Create report')">Create report</button>
    </div>
  </div>

  <div *ngIf="uiMessage" class="rounded-2xl border border-brand-200 bg-brand-50 px-4 py-3 text-sm text-brand-900" role="status" aria-live="polite">
    <div class="flex items-start justify-between gap-2">
      <p>{{ uiMessage }}</p>
      <button type="button" class="app-btn app-btn-ghost app-btn-xs" (click)="dismissMessage()">Dismiss</button>
    </div>
  </div>

  <div class="grid gap-4" *ngIf="reports.length; else noReports">
    <article *ngFor="let report of reports" class="card-surface rounded-2xl p-5">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ report.name }}</p>
          <p class="text-xs text-slate-600">Cadence: {{ report.cadence }}</p>
        </div>
        <span class="pill pill-blue">{{ report.format }}</span>
      </div>
      <div class="mt-4 flex flex-wrap gap-2">
        <button type="button" class="app-btn app-btn-primary app-btn-xs" (click)="trigger('Run report', report.name)">Run now</button>
        <button type="button" class="app-btn app-btn-secondary app-btn-xs" (click)="trigger('Schedule report', report.name)">Schedule</button>
        <button type="button" class="app-btn app-btn-secondary app-btn-xs" (click)="trigger('Download report', report.name)">Download</button>
      </div>
    </article>
  </div>

  <ng-template #noReports>
    <div class="app-state-block">No report definitions found.</div>
  </ng-template>
</section>
