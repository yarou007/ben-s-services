<section class="grid gap-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <p class="text-sm uppercase tracking-[0.2em] text-slate-400">Reports</p>
      <h2 class="text-2xl font-semibold text-slate-900">Reporting & exports</h2>
    </div>
    <div class="flex flex-wrap gap-2">
      <button class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">Export all</button>
      <button class="rounded-full bg-brand-600 px-4 py-2 text-sm font-semibold text-white">Create report</button>
    </div>
  </div>

  <div class="grid gap-4">
    <div *ngFor="let report of reports" class="card-surface rounded-2xl p-5">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ report.name }}</p>
          <p class="text-xs text-slate-500">Cadence: {{ report.cadence }}</p>
        </div>
        <span class="pill pill-blue">{{ report.format }}</span>
      </div>
      <div class="mt-4 flex flex-wrap gap-2">
        <button class="rounded-full bg-brand-600 px-3 py-2 text-xs font-semibold text-white">Run now</button>
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Schedule</button>
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Download</button>
      </div>
    </div>
  </div>
</section>
