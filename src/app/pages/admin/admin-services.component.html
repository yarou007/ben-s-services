<section class="grid gap-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <p class="text-sm uppercase tracking-[0.2em] text-slate-400">Services</p>
      <h2 class="text-2xl font-semibold text-slate-900">Service catalog management</h2>
    </div>
    <div class="flex flex-wrap gap-2">
      <button class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">Import CSV</button>
      <button class="rounded-full bg-brand-600 px-4 py-2 text-sm font-semibold text-white">Add service</button>
    </div>
  </div>

  <div class="grid gap-4">
    <div *ngFor="let service of services" class="card-surface rounded-2xl p-5">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ service.name }}</p>
          <p class="text-xs text-slate-500">{{ service.type }}</p>
        </div>
        <span class="pill pill-blue">{{ service.responseTarget }}</span>
      </div>
      <p class="mt-2 text-sm text-slate-600">Compliance: {{ service.compliance }}</p>
      <div class="mt-4 flex flex-wrap gap-2">
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Edit</button>
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Duplicate</button>
        <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">Delete</button>
      </div>
    </div>
  </div>
</section>
