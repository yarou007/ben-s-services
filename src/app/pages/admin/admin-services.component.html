<section class="grid gap-5 sm:gap-6">
  <div class="app-section-head">
    <div>
      <p class="app-kicker">Services</p>
      <h2 class="app-title">Service Catalog Management</h2>
      <p class="app-subtitle">Maintain response targets, service categories, and compliance attributes.</p>
    </div>
    <div class="app-action-row">
      <button type="button" class="app-btn app-btn-secondary" (click)="trigger('Import CSV')">Import CSV</button>
      <button type="button" class="app-btn app-btn-primary" (click)="trigger('Add service')">Add service</button>
    </div>
  </div>

  <div *ngIf="uiMessage" class="rounded-2xl border border-brand-200 bg-brand-50 px-4 py-3 text-sm text-brand-900" role="status" aria-live="polite">
    <div class="flex items-start justify-between gap-2">
      <p>{{ uiMessage }}</p>
      <button type="button" class="app-btn app-btn-ghost app-btn-xs" (click)="dismissMessage()">Dismiss</button>
    </div>
  </div>

  <div class="grid gap-4" *ngIf="services.length; else noServices">
    <article *ngFor="let service of services" class="card-surface rounded-2xl p-5">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div>
          <p class="text-lg font-semibold text-slate-900">{{ service.name }}</p>
          <p class="text-sm text-slate-600">{{ service.type }}</p>
        </div>
        <span class="pill pill-blue">{{ service.responseTarget }}</span>
      </div>
      <p class="mt-2 text-sm text-slate-700">Compliance: {{ service.compliance }}</p>
      <div class="mt-4 flex flex-wrap gap-2">
        <button type="button" class="app-btn app-btn-secondary app-btn-xs" (click)="trigger('Edit service', service.name)">Edit</button>
        <button type="button" class="app-btn app-btn-secondary app-btn-xs" (click)="trigger('Duplicate service', service.name)">Duplicate</button>
        <button type="button" class="app-btn app-btn-danger app-btn-xs" (click)="trigger('Delete service', service.name)">Delete</button>
      </div>
    </article>
  </div>

  <ng-template #noServices>
    <div class="app-state-block">No services exist yet in the catalog.</div>
  </ng-template>
</section>
