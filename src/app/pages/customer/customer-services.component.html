<section class="grid gap-8">
  <div class="card-surface rounded-3xl p-6">
    <p class="text-sm uppercase tracking-[0.2em] text-slate-400">Services</p>
    <h2 class="mt-2 text-2xl font-semibold text-slate-900">Commercial-first service catalog</h2>
    <p class="mt-2 text-sm text-slate-500">
      We prioritize commercial response while supporting residential requests with the same SLA discipline.
    </p>
  </div>

  <div class="grid gap-6 lg:grid-cols-3">
    <div *ngFor="let category of categories" class="card-surface rounded-3xl p-6">
      <p class="text-lg font-semibold text-slate-900">{{ category.name }}</p>
      <p class="mt-2 text-sm text-slate-500">{{ category.description }}</p>
      <ul class="mt-4 grid gap-2 text-sm text-slate-600">
        <li *ngFor="let item of category.items" class="flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-brand-500"></span>
          {{ item }}
        </li>
      </ul>
    </div>
  </div>

  <div class="card-surface rounded-3xl p-6">
    <div class="flex items-center justify-between">
      <h3 class="text-lg font-semibold text-slate-900">Service areas</h3>
      <button class="rounded-full border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600">View all</button>
    </div>
    <div class="mt-4 grid gap-3 md:grid-cols-2">
      <div *ngFor="let area of areas" class="rounded-2xl bg-white p-4 text-sm shadow-sm">
        <p class="font-semibold text-slate-900">{{ area.region }}</p>
        <p class="mt-1 text-xs text-slate-500">{{ area.cities }}</p>
      </div>
    </div>
  </div>
</section>
