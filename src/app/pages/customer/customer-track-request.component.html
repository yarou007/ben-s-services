<section class="mx-auto max-w-5xl">
  <div class="card-surface rounded-3xl p-5 sm:p-8" *ngIf="requests.length; else noRequests">
    <div class="app-section-head">
      <div>
        <p class="app-kicker">Track Request</p>
        <h2 class="app-title">Request Progress</h2>
        <p class="app-subtitle">Navigate between your requests and monitor the status timeline.</p>
      </div>
      <div class="app-action-row">
        <button type="button" class="rounded-full border border-slate-200 px-4 py-2 text-xs font-semibold" (click)="previousRequest()" [disabled]="selectedIndex <= 0">Previous</button>
        <button type="button" class="rounded-full border border-slate-200 px-4 py-2 text-xs font-semibold" (click)="nextRequest()" [disabled]="selectedIndex >= requests.length - 1">Next</button>
        <button type="button" class="rounded-full border border-slate-200 px-4 py-2 text-xs font-semibold" (click)="exportCurrent()">Download Summary</button>
      </div>
    </div>

    <div class="mt-4 grid gap-3 md:grid-cols-[1fr_auto] md:items-end">
      <label class="grid gap-2 text-sm font-semibold text-slate-600">
        Select request
        <select class="px-4 py-3 text-sm" [value]="selectedRequestId" (change)="selectedRequestId = $any($event.target).value">
          <option *ngFor="let request of requests" [value]="request.id">{{ request.id }} · {{ request.serviceType }} · {{ request.city }}</option>
        </select>
      </label>
      <a routerLink="/customer/service-request" class="rounded-full bg-brand-600 px-4 py-3 text-center text-sm font-semibold text-white">Create New Request</a>
    </div>

    <div class="mt-6 rounded-2xl bg-white p-5 shadow-sm" *ngIf="selectedRequest as request">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div>
          <p class="text-sm font-semibold text-slate-900">{{ request.id }} · {{ request.serviceType }}</p>
          <p class="text-xs text-slate-500">{{ request.location }} · {{ request.createdAt }}</p>
        </div>
        <app-status-badge [status]="request.status"></app-status-badge>
      </div>

      <p class="mt-3 text-xs text-slate-500">{{ request.notes }}</p>

      <div class="mt-5">
        <p class="text-sm font-semibold text-slate-900">Lifecycle timeline</p>
        <div class="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-4 xl:grid-cols-7">
          <div
            *ngFor="let step of flow"
            class="rounded-2xl border px-3 py-2 text-xs"
            [class.border-emerald-300]="reached(step)"
            [class.bg-emerald-50]="reached(step)"
            [class.border-slate-200]="!reached(step)"
            [class.bg-slate-50]="!reached(step)"
          >
            {{ formatStatus(step) }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noRequests>
    <app-empty-state
      title="No requests to track yet"
      description="Create a request first, then track it here."
      ctaLabel="Create Request"
      ctaLink="/customer/service-request"
    ></app-empty-state>
  </ng-template>
</section>
