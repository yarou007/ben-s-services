<section class="grid gap-4 lg:gap-5" aria-label="Provider dashboard">
  <app-toast-message [show]="showToast" [message]="toastMessage" [tone]="toastTone" (dismiss)="dismissToast()"></app-toast-message>

  <app-page-header
    kicker="Provider Workspace"
    title="Dashboard"
    subtitle="Track jobs, schedule load, and revenue in one view."
  >
    <button type="button" class="app-btn app-btn-secondary app-btn-sm" (click)="refresh()">Refresh</button>
    <button type="button" class="app-btn app-btn-secondary app-btn-sm" (click)="exportDashboardData()">Export</button>
    <a routerLink="/provider/requests" class="app-btn app-btn-primary app-btn-sm">Open Requests</a>
  </app-page-header>

  <div *ngIf="provider" class="rounded-2xl border border-slate-200 bg-white/85 px-4 py-2.5 text-sm text-slate-600">
    Signed in as <span class="font-semibold text-slate-900">{{ provider.name }}</span>
    <span class="mx-2 text-slate-300">|</span>
    Rating {{ provider.rating }} · {{ provider.availability }}
  </div>

  <div class="grid grid-cols-1 gap-4 lg:grid-cols-12">
    <div class="grid gap-3 sm:grid-cols-2 lg:col-span-12 xl:grid-cols-4">
      <app-dashboard-stats-card
        *ngFor="let card of summaryCards"
        [label]="card.label"
        [value]="card.value"
        [note]="card.note"
        [comparison]="card.comparison"
        [trend]="card.trend"
      ></app-dashboard-stats-card>
    </div>

    <article class="card-surface rounded-3xl p-4 sm:p-5 lg:col-span-12" aria-label="Dashboard filters">
      <div class="grid gap-3 md:grid-cols-3">
        <label class="app-field">
          <span class="app-label">Date range</span>
          <select class="app-select" [value]="chartRange" (change)="updateRange($any($event.target).value)">
            <option value="7">Last 7 days</option>
            <option value="14">Last 14 days</option>
            <option value="30">Last 30 days</option>
          </select>
        </label>

        <label class="app-field">
          <span class="app-label">Service type</span>
          <select class="app-select" [value]="serviceFilter" (change)="serviceFilter = $any($event.target).value">
            <option value="ALL">All services</option>
            <option *ngFor="let service of serviceOptions" [value]="service">{{ service }}</option>
          </select>
        </label>

        <label class="app-field">
          <span class="app-label">Employee</span>
          <select class="app-select" [value]="employeeFilter" (change)="employeeFilter = $any($event.target).value">
            <option value="ALL">All employees</option>
            <option *ngFor="let employee of employeeOptions" [value]="employee">{{ employee }}</option>
          </select>
        </label>
      </div>
    </article>

    <div class="lg:col-span-7">
      <app-provider-earnings-chart [points]="earningsChartPoints"></app-provider-earnings-chart>
    </div>

    <div class="lg:col-span-5">
      <app-provider-category-chart [bars]="serviceCategoryBars"></app-provider-category-chart>
    </div>

    <section class="card-surface rounded-3xl p-4 sm:p-5 lg:col-span-12" aria-label="Recent jobs">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h3 class="text-sm font-semibold text-slate-900">Recent Jobs</h3>
          <p class="text-xs text-slate-500">Latest assignments and quick completion action.</p>
        </div>

        <button
          type="button"
          class="app-btn app-btn-secondary app-btn-sm"
          (click)="toggleRecentJobs()"
          [attr.aria-expanded]="!recentCollapsed"
          aria-controls="dashboard-recent-jobs"
        >
          {{ recentCollapsed ? 'Expand' : 'Collapse' }}
        </button>
      </div>

      <div
        id="dashboard-recent-jobs"
        [class.hidden]="recentCollapsed"
        class="mt-3 grid max-h-[280px] gap-2 overflow-y-auto pr-1"
      >
        <article *ngFor="let job of recentJobs" class="rounded-2xl border border-slate-200 bg-white px-3 py-3">
          <div class="flex flex-wrap items-start justify-between gap-2">
            <div>
              <p class="text-sm font-semibold text-slate-900">{{ job.customerName }}</p>
              <p class="text-xs text-slate-500">{{ job.serviceType }} · {{ scheduledLabel(job) }}</p>
            </div>
            <app-status-badge [status]="job.status"></app-status-badge>
          </div>

          <p class="mt-2 text-xs text-slate-600">{{ job.title }} · {{ job.location }}</p>

          <div class="mt-2 flex flex-wrap gap-2">
            <button type="button" class="app-btn app-btn-secondary app-btn-xs" (click)="openDetails(job)">
              View details
            </button>
            <button
              type="button"
              class="app-btn app-btn-primary app-btn-xs"
              [disabled]="!canMarkComplete(job)"
              (click)="markComplete(job)"
            >
              Mark complete
            </button>
          </div>
        </article>
      </div>
    </section>
  </div>

  <app-details-modal
    [open]="showDetailsModal"
    [title]="selectedJob?.id || 'Job details'"
    [subtitle]="selectedJob?.title || ''"
    [fields]="detailsFields"
    (close)="closeDetails()"
  ></app-details-modal>
</section>
