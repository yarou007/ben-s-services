<section class="mx-auto max-w-4xl">
  <div class="card-surface rounded-3xl p-5 sm:p-8">
    <p class="app-kicker">Provider Registration</p>
    <h2 class="app-title">Join the ServicePro network</h2>
    <p class="app-subtitle">Complete your profile to become eligible for dispatch assignments.</p>

    <form class="mt-6 grid gap-4">
      <div class="grid gap-4 md:grid-cols-2">
        <label class="grid gap-2 text-sm font-semibold text-slate-600">
          Full name
          <input class="px-4 py-3 text-sm" placeholder="Taylor Morgan" />
        </label>
        <label class="grid gap-2 text-sm font-semibold text-slate-600">
          Phone
          <input class="px-4 py-3 text-sm" placeholder="(646) 555-0199" />
        </label>
      </div>

      <div class="grid gap-4 md:grid-cols-2">
        <label class="grid gap-2 text-sm font-semibold text-slate-600">
          Email
          <input class="px-4 py-3 text-sm" placeholder="provider@servicepro.com" />
        </label>
        <label class="grid gap-2 text-sm font-semibold text-slate-600">
          Service expertise
          <select class="px-4 py-3 text-sm">
            <option>Locksmith</option>
            <option>Glass Repair</option>
            <option>Both</option>
          </select>
        </label>
      </div>

      <label class="grid gap-2 text-sm font-semibold text-slate-600">
        Service areas
        <input class="px-4 py-3 text-sm" placeholder="Brooklyn, Manhattan" />
      </label>

      <label class="grid gap-2 text-sm font-semibold text-slate-600">
        Availability schedule
        <input class="px-4 py-3 text-sm" placeholder="Mon-Sat, 08:00-20:00" />
      </label>

      <div class="rounded-2xl border border-dashed border-slate-300 bg-white px-4 py-6 text-center text-sm text-slate-500">
        <p class="font-semibold text-slate-700">Upload certifications (optional)</p>
        <p class="mt-1 text-xs">PDF or JPG, up to 10MB</p>
        <button class="mt-3 rounded-full border border-slate-200 px-4 py-2 text-xs font-semibold text-slate-600" type="button">
          Choose files
        </button>
      </div>

      <div class="flex flex-wrap gap-3">
        <button class="flex-1 rounded-2xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white">Submit application</button>
        <button class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-600" type="button">Save draft</button>
      </div>
      <p class="text-xs text-slate-500">Mock submission only. Admin will review before activation.</p>
    </form>
  </div>
</section>
