<div *ngIf="open" class="app-dialog-overlay" (click)="!loading && cancel.emit()">
  <section class="app-dialog max-w-md" role="dialog" aria-modal="true" [attr.aria-label]="title" (click)="$event.stopPropagation()">
    <p class="text-lg font-semibold text-slate-900">{{ title }}</p>
    <p class="mt-2 text-sm text-slate-600">{{ message }}</p>

    <div class="mt-5 flex flex-wrap justify-end gap-2">
      <button type="button" class="app-btn app-btn-secondary" [disabled]="loading" (click)="cancel.emit()">{{ cancelLabel }}</button>
      <button type="button" class="app-btn app-btn-danger" [disabled]="loading" (click)="confirm.emit()">
        {{ loading ? 'Saving...' : confirmLabel }}
      </button>
    </div>
  </section>
</div>
