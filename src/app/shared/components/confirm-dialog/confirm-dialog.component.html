<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/45 p-4" (click)="!loading && cancel.emit()">
  <section class="w-full max-w-md rounded-3xl bg-white p-6 shadow-soft" (click)="$event.stopPropagation()">
    <p class="text-lg font-semibold text-slate-900">{{ title }}</p>
    <p class="mt-2 text-sm text-slate-500">{{ message }}</p>

    <div class="mt-5 flex flex-wrap justify-end gap-2">
      <button type="button" class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600" [disabled]="loading" (click)="cancel.emit()">{{ cancelLabel }}</button>
      <button type="button" class="rounded-full bg-rose-600 px-4 py-2 text-sm font-semibold text-white disabled:cursor-not-allowed disabled:opacity-70" [disabled]="loading" (click)="confirm.emit()">
        {{ loading ? 'Saving...' : confirmLabel }}
      </button>
    </div>
  </section>
</div>
