<div *ngIf="open" class="app-dialog-overlay" (click)="close.emit()">
  <section class="app-dialog max-w-xl" role="dialog" aria-modal="true" [attr.aria-label]="title" (click)="$event.stopPropagation()">
    <div class="app-section-head">
      <div>
        <p class="app-kicker">Details</p>
        <h3 class="text-xl font-semibold text-slate-900">{{ title }}</h3>
        <p *ngIf="subtitle" class="mt-1 text-sm text-slate-600">{{ subtitle }}</p>
      </div>
      <button type="button" class="app-btn app-btn-secondary app-btn-sm" (click)="close.emit()">Close</button>
    </div>

    <div class="mt-5 grid gap-3">
      <div *ngFor="let field of fields" class="rounded-2xl bg-slate-50 px-4 py-3 text-sm">
        <p class="text-xs uppercase tracking-[0.14em] text-slate-500">{{ field.label }}</p>
        <p class="mt-1 font-semibold text-slate-900">{{ field.value }}</p>
      </div>
    </div>
  </section>
</div>
