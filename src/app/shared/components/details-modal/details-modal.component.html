<div *ngIf="open" class="app-dialog-overlay" (click)="close.emit()">
  <section class="app-dialog max-w-3xl" role="dialog" aria-modal="true" [attr.aria-label]="title" (click)="$event.stopPropagation()">
    <div class="app-section-head">
      <div class="flex min-w-0 items-center gap-3">
        <div class="inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl border border-brand-200 bg-brand-50 text-sm font-bold text-brand-800">
          {{ profileInitials }}
        </div>
        <div class="min-w-0">
          <p class="app-kicker">Details</p>
          <h3 class="truncate text-2xl font-semibold text-slate-900">{{ title }}</h3>
          <p *ngIf="subtitle" class="mt-1 break-words text-sm text-slate-600">{{ subtitle }}</p>
        </div>
      </div>
      <button type="button" class="app-btn app-btn-secondary app-btn-sm" (click)="close.emit()">Close</button>
    </div>

    <div *ngIf="spotlightFields.length" class="mt-5 grid gap-3 sm:grid-cols-3">
      <article *ngFor="let field of spotlightFields" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
        <p class="text-xs uppercase tracking-[0.14em] text-slate-500">{{ field.label }}</p>
        <p class="mt-1 break-words text-lg font-semibold text-slate-900" [ngClass]="fieldToneClass(field.label)">{{ field.value }}</p>
      </article>
    </div>

    <div class="mt-5 grid gap-3 sm:grid-cols-2">
      <article *ngFor="let field of detailFields" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm">
        <p class="text-xs uppercase tracking-[0.14em] text-slate-500">{{ field.label }}</p>
        <p class="mt-1 break-words font-semibold text-slate-900" [ngClass]="fieldToneClass(field.label)">{{ field.value }}</p>
      </article>
    </div>

    <p *ngIf="!normalizedFields.length" class="mt-4 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-600">
      No additional details are available for this record.
    </p>
  </section>
</div>
