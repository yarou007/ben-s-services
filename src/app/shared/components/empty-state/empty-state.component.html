<div class="app-state-block">
  <p class="text-sm font-semibold text-slate-900">{{ title }}</p>
  <p *ngIf="description" class="mt-1 text-sm text-slate-500">{{ description }}</p>
  <a *ngIf="ctaLabel && ctaLink" [routerLink]="ctaLink" class="mt-3 inline-flex rounded-full bg-brand-600 px-4 py-2 text-xs font-semibold text-white">
    {{ ctaLabel }}
  </a>
</div>
