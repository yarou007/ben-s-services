<div class="app-state-block">
  <p class="text-sm font-semibold text-slate-900">{{ title }}</p>
  <p *ngIf="description" class="mt-1 text-sm text-slate-600">{{ description }}</p>
  <a *ngIf="ctaLabel && ctaLink" [routerLink]="ctaLink" class="app-btn app-btn-primary app-btn-sm mt-3 inline-flex">
    {{ ctaLabel }}
  </a>
</div>
