<nav class="flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm" aria-label="Pagination controls">
  <div class="text-slate-700">
    Page {{ page }} of {{ totalPages }}
    <span class="text-slate-400">({{ total }} records)</span>
  </div>

  <div class="flex flex-wrap items-center gap-2">
    <label class="text-xs font-semibold text-slate-600">
      Page size
      <select class="app-select ml-2 min-h-[34px] rounded-full px-3 py-1 text-xs" [value]="pageSize" (change)="onPageSizeChange($any($event.target).value)">
        <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
      </select>
    </label>

    <button type="button" (click)="previous()" [disabled]="!canPrevious" class="app-btn app-btn-secondary app-btn-xs">Previous</button>
    <button type="button" (click)="next()" [disabled]="!canNext" class="app-btn app-btn-secondary app-btn-xs">Next</button>
  </div>
</nav>
